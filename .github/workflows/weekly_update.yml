name: Weekly Schedule Update

on:
  schedule:
    - cron: '0 0 * * 1' # Runs every Monday at midnight
  workflow_dispatch: # Allows manual triggering

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip' # Use pip caching for dependencies

      - name: Set up Java (required by tabula-py)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node (required for frontend tests)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python environment
        run: |
          python -m venv venv
          ./venv/bin/pip install --upgrade pip
          ./venv/bin/pip install -r requirements.txt

      - name: Run tests
        run: |
          ./venv/bin/python -m pytest tests/test_master_aggregator.py
          node tests/test_availability.mjs

      - name: Run parsers
        run: |
          ./venv/bin/python parse_mewa.py
          ./venv/bin/python parse_delfin.py
          ./venv/bin/python parse_olimpijczyk.py

      - name: Run aggregator
        run: ./venv/bin/python master_aggregator.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          force_orphan: true
          commit_message: 'Update pool schedules'
