<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gliwice Pool Availability</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Gliwice Pool Availability</h1>
        
        <div class="controls">
            <select id="city-filter" disabled>
                <option value="Gliwice">Gliwice</option>
            </select>
            <select id="day-filter">
                <option value="all">Wszystkie dni</option>
                <option value="Poniedziałek">Poniedziałek</option>
                <option value="Wtorek">Wtorek</option>
                <option value="Środa">Środa</option>
                <option value="Czwartek">Czwartek</option>
                <option value="Piątek">Piątek</option>
                <option value="Sobota">Sobota</option>
                <option value="Niedziela">Niedziela</option>
            </select>
        </div>

        <div id="top-highlights">
            <h2>Best Available Slots</h2>
            <div id="highlights-container"></div>
        </div>
        <div id="pool-availability">
            <!-- Pool data will be loaded here by JavaScript -->
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
